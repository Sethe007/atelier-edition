name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # La suite maison tourne via un shim Vitest (le Vitest natif crashe dans
      # certains environnements). npm ci écrase node_modules/vitest : on le recrée.
      - name: Recreate Vitest shim
        run: |
          mkdir -p node_modules/vitest
          printf '{"name":"vitest","version":"0.0.0","type":"module","main":"index.mjs"}' > node_modules/vitest/package.json
          printf 'export * from "../../test/_shim.mjs";\n' > node_modules/vitest/index.mjs

      - name: Test
        run: node test/_run.mjs

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
